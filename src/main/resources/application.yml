spring:
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

logging:
  level:
    root: INFO
    com.thesis.frauddetection: DEBUG

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o

app:
  jwt:
    secret: ${JWT_SECRET_BASE64:ZGV2LW9ubHktand0LXNlY3JldC1jaGFuZ2UtbWUtbm93LTI1Ni1iaXRzIQ==}
    expiration-ms: 86400000
